name: 'Build windows'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest]
        arch: [x64]
        mode: [releasedbg]

    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"

    steps:
      - uses: actions/checkout@v4

      - name: 'Checkout submodules'
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --force --recursive --depth=1

      - name: 'Cache xmake dependencies'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake/packages
          key: ${{ runner.os }}-xmake-packages-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-xmake-packages-

      # Install xmake
      - name: 'Setup xmake'
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: v3.0.9 # Sync with cache key too
          actions-cache-folder: '.xmake-cache' # This doesn't cache dependencies, only xmake itself
          actions-cache-key: ${{ runner.os }}-xmake-cache-3.0.9

      - name: 'Configure xmake and install dependencies'
        run: xmake config --arch=${{ matrix.arch }} --mode=${{ matrix.mode }} --yes

      # Build the client artifact chain only. The server stack is built and
      # gated by the linux workflow; building it here additionally requires
      # SdkGenerator's CppSharp (1.1.5, 2024) to parse headers with the
      # current VS toolchain, which silently generates nothing on 2026
      # windows-latest images (CyberpunkSdk then fails to compile).
      # xmake's build/install commands take a single target argument. Building
      # Client pulls Archives/Inputs/Tweaks/redscript automatically (add_deps),
      # but install has no dep-closure, so each install-relevant target is
      # installed explicitly.
      - name: 'Build with xmake'
        run: xmake -y Client

      - name: 'Generate build'
        run: xmake install -o distrib Client && xmake install -o distrib Archives && xmake install -o distrib Inputs && xmake install -o distrib Tweaks && xmake install -o distrib redscript

      - name: 'Package build'
        run: xmake pack

      - name: 'Upload Artifact'
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: build/xpack/NightCityMP/Artifacts.zip
