name: 'Build windows'

# EXPERIMENT (branch experiment/windows-server-ci): can the FULL SERVER build on
# windows-2022 + VS2022 + the upstream vs_sdkver pin? Discriminates the two
# hypotheses for SdkGenerator's silent no-output on windows-latest (VS2026 default
# since 2026-06 vs. a CppSharp bug). Also answers, for the first time, whether
# Server.Native's C++ dependency chain compiles on windows at all in this fork,
# and captures the MSVC-mangled exports for the bindings-portability question.

on:
  workflow_dispatch:
  push:
    branches:
      - experiment/windows-server-ci

jobs:
  build:
    strategy:
      matrix:
        os: [windows-2022]
        arch: [x64]
        mode: [releasedbg]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: 'Checkout submodules'
        run: |
          git config --global url."https://github.com/".insteadOf "git@github.com:"
          git submodule sync --recursive
          git submodule update --init --force --recursive --depth=1

      - name: 'Cache xmake dependencies'
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/.xmake/packages
          key: ${{ runner.os }}-2022-xmake-packages-${{ hashFiles('**/xmake.lua') }}
          restore-keys: |
            ${{ runner.os }}-2022-xmake-packages-

      - name: 'Setup xmake'
        uses: xmake-io/github-action-setup-xmake@v1
        with:
          xmake-version: v3.0.9
          actions-cache-folder: '.xmake-cache'
          actions-cache-key: ${{ runner.os }}-xmake-cache-3.0.9

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9

      # vs_sdkver pin mirrors upstream tiltedphoques' last known-good windows CI
      - name: 'Configure xmake and install dependencies'
        run: xmake config --arch=${{ matrix.arch }} --mode=${{ matrix.mode }} --vs_sdkver=10.0.19041.0 --yes

      - name: 'Build server chain'
        run: xmake -y Server.Loader

      - name: 'Verify SdkGenerator output'
        shell: pwsh
        run: |
          $f = "code/server/scripting/CyberpunkSdk/CyberpunkSdk.Internal.cs"
          if (!(Test-Path $f)) { Write-Error "Internal.cs NOT generated - SdkGenerator still silent on windows-2022"; exit 1 }
          $lines = (Get-Content $f).Count
          Write-Host "Internal.cs generated: $lines lines"
          if ($lines -lt 100) { Write-Error "Internal.cs suspiciously small"; exit 1 }
          Write-Host "--- first 5 EntryPoint strings (mangling scheme check) ---"
          Select-String -Path $f -Pattern 'EntryPoint = "' | Select-Object -First 5

      - name: 'Dump Server.Native exports (mangling ground truth)'
        shell: pwsh
        continue-on-error: true
        run: |
          $dll = Get-ChildItem -Recurse build -Filter Server.Native.dll | Select-Object -First 1
          if ($dll) {
            $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
            $dumpbin = Get-ChildItem -Recurse "$vsPath\VC\Tools\MSVC" -Filter dumpbin.exe | Where-Object FullName -match 'Hostx64\\x64' | Select-Object -First 1
            & $dumpbin.FullName /exports $dll.FullName | Select-Object -First 60
          } else { Write-Host "Server.Native.dll not found in build/" }

      - name: 'Upload generated bindings + build log'
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-server-experiment
          path: |
            code/server/scripting/CyberpunkSdk/CyberpunkSdk.Internal.cs
          if-no-files-found: ignore
