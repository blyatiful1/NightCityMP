name: Build linux

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-24.04]
        arch: [x64]
        mode: [release]

    runs-on: ${{ matrix.os }}
    if: "!contains(github.event.head_commit.message, 'ci skip')"

    steps:
    - uses: actions/checkout@v4

    - name: 'Checkout submodules'
      run: |
        git config --global url."https://github.com/".insteadOf "git@github.com:"
        git submodule sync --recursive
        git submodule update --init --force --recursive --depth=1

    # Install dependencies
    - name: 'Update apt repositories'
      run: sudo apt-get update

    # pnpm is needed by the Server.Admin target (React/Vite admin panel)
    - name: Install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    # Install xmake (pinned; matches the windows workflow and local dev)
    - name: 'Setup xmake'
      uses: xmake-io/github-action-setup-xmake@v1
      with:
        xmake-version: v3.0.9

    # Update xmake repository (in order to have the file that will be cached)
    - name: 'Update xmake repository'
      run: xmake repo --update

    - name: Setup dotnet
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9

    # Setup compilation mode and install project dependencies
    - name: 'Configure xmake and install dependencies'
      continue-on-error: true
      run: timeout 30m xmake config --arch=${{ matrix.arch }} --mode=${{ matrix.mode }} --yes

    # Build the server
    - name: Build
      run: xmake -y

    # Stage the linux server runtime for release-kit consumption
    # (scripts/make-release-kit.sh --server-run <id> downloads this artifact).
    # The loader target's on_install is windows-centric (copies Server.Loader.exe,
    # which does not exist on linux), so stage the runtime files directly from the
    # build tree instead — this is exactly the self-contained tree the kit expects.
    - name: 'Stage server bundle'
      run: |
        set -e
        D="build/linux/${{ matrix.arch }}/release"
        test -f "$D/Server.Loader" || { echo "Server.Loader apphost missing"; exit 1; }
        mkdir -p distrib
        cp -a "$D"/Server.Loader "$D"/*.dll "$D"/*.so "$D"/*.json distrib/
        cp -a "$D"/plugins "$D"/sdk distrib/
        echo "staged server bundle:"; ls -la distrib

    - name: 'Upload server artifact'
      if: github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: server-linux
        path: distrib/
